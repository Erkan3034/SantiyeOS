name: Backend CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  test-package-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Security check
        shell: pwsh
        run: ./scripts/security-check.ps1

      - name: Run tests
        run: ./mvnw test

      - name: Package jar
        run: ./mvnw -DskipTests package

      - name: Build Docker image
        run: docker build -t santiyeos-api:${{ github.sha }} .
