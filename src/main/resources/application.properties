spring.application.name=santiyeos-api
spring.profiles.default=dev

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/santiyeos?useSSL=false&serverTimezone=Europe/Istanbul&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:admin}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

server.port=8081

app.jwt.secret=${JWT_SECRET:santiyeos-development-secret-key-change-this-before-production-2026}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:120}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

logging.level.com.santiyeos.api=${APP_LOG_LEVEL:INFO}
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
